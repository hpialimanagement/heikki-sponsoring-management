<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsoring – Heikki Piali</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0e15;
  --s1:       #111520;
  --s2:       #181d2a;
  --s3:       #1f2535;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.12);
  --text:     #dde3f0;
  --muted:    #5a637a;
  --muted2:   #7e8aa3;
  --blue:     #4f8ef7;
  --green:    #36d68a;
  --red:      #f06464;
  --yellow:   #f5b942;
  --purple:   #9d7ef5;
  --teal:     #2ecfb8;
  --r:        8px;
  --font:     'Outfit', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse 80% 60% at 50% 0%, #0f1e3a 0%, var(--bg) 70%)}
.login-wrap{width:100%;max-width:360px;padding:20px}
.login-card{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:40px 36px;box-shadow:0 32px 64px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.login-logo .icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.login-logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.login-sub{color:var(--muted2);font-size:13px;margin-bottom:28px;margin-left:46px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}
.field input{width:100%;padding:10px 13px;background:var(--s2);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--r);font-size:14px;font-family:var(--font);transition:border-color .2s,box-shadow .2s}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.18)}
.field input::placeholder{color:var(--muted)}
.btn-login{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 4px 16px rgba(79,142,247,.25)}
.btn-login:hover{background:#3d7ef5;transform:translateY(-1px)}
.login-err{color:var(--red);font-size:13px;margin-top:12px;text-align:center;display:none}

/* DASHBOARD */
#dashboardScreen{display:none}
#dashboardScreen.active{display:block}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;background:rgba(11,14,21,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px}
.topbar-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}
.topbar-logo .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--mono);padding:4px 10px;background:var(--s2);border-radius:20px;border:1px solid var(--border)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-top{padding:6px 14px;background:transparent;color:var(--muted2);border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-top:hover{color:var(--text);border-color:var(--border2);background:var(--s2)}
.btn-top.danger:hover{color:var(--red);border-color:var(--red)}

/* PAGE */
.page{max-width:1480px;margin:0 auto;padding:24px 24px 60px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:border-color .2s,transform .15s;cursor:default}
.stat:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.stat-val{font-size:32px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-bar{height:2px;border-radius:1px;margin-top:10px;background:var(--border2);overflow:hidden}
.stat-fill{height:100%;border-radius:1px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.c-blue{color:var(--blue)}.c-yellow{color:var(--yellow)}.c-teal{color:var(--teal)}.c-green{color:var(--green)}.c-red{color:var(--red)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--s1);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--r);font-size:13px;font-family:var(--font);transition:border-color .2s,box-shadow .2s}
.search-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.14)}
.search-wrap input::placeholder{color:var(--muted)}
.filter-sel{padding:9px 12px;background:var(--s1);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--r);font-size:13px;font-family:var(--font);cursor:pointer;transition:border-color .2s}
.filter-sel:focus{outline:none;border-color:var(--blue)}
.filter-sel option{background:#181d2a}
.ml-auto{margin-left:auto;display:flex;gap:10px}
.btn-primary{padding:9px 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap}
.btn-primary:hover{background:#3d7ef5;transform:translateY(-1px)}
.btn-outline{padding:9px 14px;background:transparent;color:var(--muted2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-outline:hover{color:var(--text);border-color:var(--border2);background:var(--s2)}

/* TABLE */
.table-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.table-meta span{font-size:11px;color:var(--muted);font-family:var(--mono)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:820px}
thead{background:var(--s2)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(255,255,255,.025)}
.company-name{font-weight:600;font-size:14px}
.contact-person{font-size:12px;color:var(--muted2);margin-top:2px}
.email-a{color:var(--blue);text-decoration:none;font-size:12px;font-family:var(--mono)}
.email-a:hover{text-decoration:underline}
.cat-tag{display:inline-block;padding:2px 8px;background:var(--s3);border:1px solid var(--border2);border-radius:4px;font-size:11px;color:var(--muted2);white-space:nowrap}
.date-txt{font-size:12px;font-family:var(--mono);color:var(--muted2)}
.notes-txt{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:var(--muted2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-grey{background:rgba(90,99,122,.18);color:#7e8aa3} .b-grey .dot{background:#5a637a}
.b-yellow{background:rgba(245,185,66,.12);color:var(--yellow)} .b-yellow .dot{background:var(--yellow)}
.b-blue{background:rgba(79,142,247,.12);color:var(--blue)} .b-blue .dot{background:var(--blue)}
.b-teal{background:rgba(46,207,184,.12);color:var(--teal)} .b-teal .dot{background:var(--teal)}
.b-red{background:rgba(240,100,100,.12);color:var(--red)} .b-red .dot{background:var(--red)}
.b-green{background:rgba(54,214,138,.12);color:var(--green)} .b-green .dot{background:var(--green)}

/* ROW ACTIONS */
.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}
.ra-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--s2);color:var(--muted2);font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s}
.ra-btn:hover{color:var(--blue);border-color:var(--blue);background:rgba(79,142,247,.08)}
.ra-btn.del:hover{color:var(--red);border-color:var(--red);background:rgba(240,100,100,.08)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:16px}
.empty h3{color:var(--muted2);font-size:15px;margin-bottom:6px}
.empty p{font-size:12px}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#modal.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:17px;font-weight:700}
.modal-close{width:30px;height:30px;background:var(--s2);border:1px solid var(--border2);border-radius:6px;color:var(--muted2);font-size:18px;cursor:pointer;display:grid;place-items:center;transition:all .15s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2)}
.fg input,.fg select,.fg textarea{padding:9px 12px;background:var(--s2);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--r);font-size:13px;font-family:var(--font);transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted)}
.fg select option{background:#181d2a}
.fg textarea{resize:vertical;min-height:90px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.btn-cancel{padding:9px 18px;background:transparent;color:var(--muted2);border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.btn-cancel:hover{color:var(--text);background:var(--s2)}
.btn-save{padding:9px 22px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .2s}
.btn-save:hover{background:#3d7ef5}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 16px 40px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:1200px){.stats{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.page{padding:16px}.toolbar{flex-direction:column;align-items:stretch}.ml-auto{margin-left:0}.form-grid{grid-template-columns:1fr}.fg.full{grid-column:1}.live-badge{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🎯</div>
        <h1>Sponsoring</h1>
      </div>
      <p class="login-sub">Heikki Piali · Management</p>
      <div class="field">
        <label>Passwort</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="handleLogin()">Anmelden →</button>
      <div class="login-err" id="loginErr">Falsches Passwort</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="dot"></div>
      Sponsoring Management
    </div>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <button class="btn-top" onclick="exportCSV()">📥 Export CSV</button>
      <button class="btn-top danger" onclick="handleLogout()">Abmelden</button>
    </div>
  </div>

  <div class="page">
    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Gesamt</div>
        <div class="stat-val c-blue" id="statTotal">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barTotal" style="background:var(--blue);width:100%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Noch offen</div>
        <div class="stat-val c-yellow" id="statPending">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barPending" style="background:var(--yellow)"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Gesendet</div>
        <div class="stat-val c-blue" id="statSent">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barSent" style="background:var(--blue)"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Antworten</div>
        <div class="stat-val c-teal" id="statResponses">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barResp" style="background:var(--teal)"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Absagen</div>
        <div class="stat-val c-red" id="statRejections">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barRej" style="background:var(--red)"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Partner ✓</div>
        <div class="stat-val c-green" id="statPartners">0</div>
        <div class="stat-bar"><div class="stat-fill" id="barPart" style="background:var(--green)"></div></div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Firma, Ansprechpartner, E-Mail…" oninput="renderTable()">
      </div>
      <select class="filter-sel" id="categoryFilter" onchange="renderTable()">
        <option value="">Alle Kategorien</option>
        <option>Kopfsponsor</option>
        <option>Seitenkopf-Sponsor</option>
        <option>Verpflegung/Trinkgurt</option>
        <option>Ausrüstung</option>
        <option>Sonstiges</option>
      </select>
      <select class="filter-sel" id="statusFilter" onchange="renderTable()">
        <option value="">Alle Status</option>
        <option>Noch nicht kontaktiert</option>
        <option>E-Mail in Vorbereitung</option>
        <option>E-Mail gesendet</option>
        <option>Antwort erhalten</option>
        <option>Absage</option>
        <option>Zusage/Partner</option>
      </select>
      <div class="ml-auto">
        <button class="btn-outline" onclick="clearFilters()">↺ Zurücksetzen</button>
        <button class="btn-primary" onclick="openAdd()">+ Neuer Sponsor</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-meta">
        <span id="tableCount">Lade…</span>
        <span id="lastRefresh"></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Firma / Kontakt</th>
              <th>E-Mail</th>
              <th>Kategorie</th>
              <th>Status</th>
              <th>Notizen</th>
              <th>E-Mail am</th>
              <th>Antwort am</th>
              <th style="width:120px">Aktionen</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modalTitle">Neuer Sponsor</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg"><label>Firmenname *</label><input type="text" id="mCompany" placeholder="Musterfirma GmbH"></div>
        <div class="fg"><label>Ansprechpartner *</label><input type="text" id="mContact" placeholder="Max Mustermann"></div>
        <div class="fg full"><label>E-Mail *</label><input type="email" id="mEmail" placeholder="max@firma.de"></div>
        <div class="fg"><label>Kategorie *</label>
          <select id="mCategory">
            <option value="">– bitte wählen –</option>
            <option>Kopfsponsor</option><option>Seitenkopf-Sponsor</option>
            <option>Verpflegung/Trinkgurt</option><option>Ausrüstung</option><option>Sonstiges</option>
          </select>
        </div>
        <div class="fg"><label>Status</label>
          <select id="mStatus">
            <option>Noch nicht kontaktiert</option><option>E-Mail in Vorbereitung</option>
            <option>E-Mail gesendet</option><option>Antwort erhalten</option>
            <option>Absage</option><option>Zusage/Partner</option>
          </select>
        </div>
        <div class="fg"><label>E-Mail versendet am</label><input type="date" id="mEmailDate"></div>
        <div class="fg"><label>Antwort erhalten am</label><input type="date" id="mRespDate"></div>
        <div class="fg full"><label>Notizen</label><textarea id="mNotes" placeholder="Gesprächsnotizen, Bemerkungen…"></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="handleSave()">Speichern</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script>
const API = 'https://3001-iz520piq5sdk04il85ae5-5fb823c7.sg1.manus.computer/api';
let sponsors = [], editId = null, refreshTimer = null;

/* UTILS */
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}

function toast(msg, icon='✓', err=false){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').textContent=icon;
  el.style.borderColor=err?'rgba(240,100,100,.4)':'rgba(54,214,138,.4)';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

/* AUTH */
async function handleLogin(){
  const pw=document.getElementById('passwordInput').value;
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!pw){err.textContent='Bitte Passwort eingeben';err.style.display='block';return}
  try{
    const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d=await r.json();
    if(d.success){
      localStorage.setItem('hp_auth','1');
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('dashboardScreen').classList.add('active');
      await loadData();
      startRefresh();
    }else{err.textContent='Falsches Passwort';err.style.display='block'}
  }catch(e){err.textContent='Verbindungsfehler';err.style.display='block'}
}

function handleLogout(){
  stopRefresh();localStorage.removeItem('hp_auth');sponsors=[];
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboardScreen').classList.remove('active');
  document.getElementById('passwordInput').value='';
}

/* DATA */
async function loadData(){
  try{
    const [sRes,stRes]=await Promise.all([fetch(`${API}/sponsors`),fetch(`${API}/stats`)]);
    sponsors=await sRes.json();
    const st=await stRes.json();
    renderStats(st);
    renderTable();
    document.getElementById('lastRefresh').textContent='Stand: '+new Date().toLocaleTimeString('de-DE');
  }catch(e){console.warn(e)}
}

function renderStats(s){
  const t=s.total||0;
  const vals={statTotal:t,statPending:s.pending??0,statSent:s.contacted??0,statResponses:s.responses??0,statRejections:s.rejections??0,statPartners:s.partners??0};
  const bars={barTotal:t,barPending:s.pending??0,barSent:s.contacted??0,barResp:s.responses??0,barRej:s.rejections??0,barPart:s.partners??0};
  Object.entries(vals).forEach(([id,v])=>document.getElementById(id).textContent=v);
  Object.entries(bars).forEach(([id,v])=>document.getElementById(id).style.width=(t?Math.round(v/t*100):0)+'%');
}

/* TABLE */
function getBadge(status){
  const map={'Noch nicht kontaktiert':['b-grey','Noch nicht kontaktiert'],'E-Mail in Vorbereitung':['b-yellow','In Vorbereitung'],'E-Mail gesendet':['b-blue','Gesendet'],'Antwort erhalten':['b-teal','Antwort erhalten'],'Absage':['b-red','Absage'],'Zusage/Partner':['b-green','✓ Partner']};
  const[cls,label]=map[status]||['b-grey',status];
  return`<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cf=document.getElementById('categoryFilter').value;
  const sf=document.getElementById('statusFilter').value;
  const filtered=sponsors.filter(s=>{
    const txt=[s.company_name,s.contact_person,s.email].join(' ').toLowerCase();
    return(!q||txt.includes(q))&&(!cf||s.category===cf)&&(!sf||s.status===sf);
  });
  document.getElementById('tableCount').textContent=filtered.length+' Einträge';
  const tbody=document.getElementById('tbody');
  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="8"><div class="empty"><div class="empty-icon">📋</div><h3>${sponsors.length?'Keine Treffer':'Noch keine Sponsoren'}</h3><p>${sponsors.length?'Filter anpassen':'Klicken Sie auf "+ Neuer Sponsor"'}</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML=filtered.map(s=>`<tr>
    <td><div class="company-name">${esc(s.company_name)}</div><div class="contact-person">${esc(s.contact_person)}</div></td>
    <td><a class="email-a" href="mailto:${esc(s.email)}">${esc(s.email)}</a></td>
    <td><span class="cat-tag">${esc(s.category||'–')}</span></td>
    <td>${getBadge(s.status)}</td>
    <td><span class="notes-txt" title="${esc(s.notes||'')}">${esc(s.notes||'–')}</span></td>
    <td><span class="date-txt">${s.email_date||'—'}</span></td>
    <td><span class="date-txt">${s.response_date||'—'}</span></td>
    <td><div class="row-actions"><button class="ra-btn edit" onclick="openEdit(${s.id})">Bearbeiten</button><button class="ra-btn del" onclick="deleteSponsor(${s.id})">Löschen</button></div></td>
  </tr>`).join('');
}

function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('categoryFilter').value='';
  document.getElementById('statusFilter').value='';
  renderTable();
}

/* MODAL */
function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Neuer Sponsor';
  ['mCompany','mContact','mEmail','mNotes','mEmailDate','mRespDate'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mCategory').value='';
  document.getElementById('mStatus').value='Noch nicht kontaktiert';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('mCompany').focus(),120);
}

function openEdit(id){
  const s=sponsors.find(x=>x.id===id);if(!s)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Sponsor bearbeiten';
  document.getElementById('mCompany').value=s.company_name||'';
  document.getElementById('mContact').value=s.contact_person||'';
  document.getElementById('mEmail').value=s.email||'';
  document.getElementById('mCategory').value=s.category||'';
  document.getElementById('mStatus').value=s.status||'Noch nicht kontaktiert';
  document.getElementById('mEmailDate').value=s.email_date||'';
  document.getElementById('mRespDate').value=s.response_date||'';
  document.getElementById('mNotes').value=s.notes||'';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show')}

async function handleSave(){
  const company=document.getElementById('mCompany').value.trim();
  const contact=document.getElementById('mContact').value.trim();
  const email=document.getElementById('mEmail').value.trim();
  const category=document.getElementById('mCategory').value;
  if(!company||!contact||!email||!category){toast('Bitte alle Pflichtfelder ausfüllen','⚠️',true);return}
  const body={company_name:company,contact_person:contact,email,category,
    status:document.getElementById('mStatus').value,
    email_date:document.getElementById('mEmailDate').value,
    response_date:document.getElementById('mRespDate').value,
    notes:document.getElementById('mNotes').value.trim()};
  try{
    const url=editId?`${API}/sponsors/${editId}`:`${API}/sponsors`;
    const method=editId?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){closeModal();await loadData();toast(editId?'Aktualisiert':'Hinzugefügt','✓')}
    else toast('Fehler beim Speichern','✕',true);
  }catch(e){toast('Verbindungsfehler','✕',true)}
}

async function deleteSponsor(id){
  const s=sponsors.find(x=>x.id===id);
  if(!confirm(`"${s?.company_name||'Eintrag'}" wirklich löschen?`))return;
  try{
    const r=await fetch(`${API}/sponsors/${id}`,{method:'DELETE'});
    if(r.ok){await loadData();toast('Gelöscht','🗑️')}
    else toast('Fehler beim Löschen','✕',true);
  }catch(e){toast('Verbindungsfehler','✕',true)}
}

/* EXPORT */
function exportCSV(){
  if(!sponsors.length){toast('Keine Daten','⚠️',true);return}
  const h=['Firma','Ansprechpartner','E-Mail','Kategorie','Status','E-Mail am','Antwort am','Notizen'];
  const rows=sponsors.map(s=>[s.company_name,s.contact_person,s.email,s.category,s.status,s.email_date||'',s.response_date||'',s.notes||''].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`sponsoren_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();toast('CSV exportiert','📥');
}

/* REFRESH */
function startRefresh(){refreshTimer=setInterval(loadData,30000)}
function stopRefresh(){clearInterval(refreshTimer)}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')handleLogin();
  if(e.key==='Escape')closeModal();
});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

/* INIT */
window.addEventListener('load',()=>{
  if(localStorage.getItem('hp_auth')==='1'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboardScreen').classList.add('active');
    loadData();startRefresh();
  }
});
window.addEventListener('beforeunload',stopRefresh);
</script>
</body>
</html>
